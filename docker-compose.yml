name: world-simulation-engine

services:
  neo4j:
    image: neo4j:2026.04.0
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"  # Change this to secure username and password for neo4j
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'

  app:
    build: .
    container_name: world-simulation-engine
    ports:
      - "9798:80"
    volumes:
      - ./data:/app/data
